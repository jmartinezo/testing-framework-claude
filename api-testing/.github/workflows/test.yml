name: API Testing

on:
  push:
    branches: [main, develop]
    paths:
      - "api-testing/**"
  pull_request:
    branches: [main]
    paths:
      - "api-testing/**"
  workflow_dispatch:

env:
  BASE_URL: https://petstore3.swagger.io/api/v3
  OPENAPI_SPEC_URL: https://petstore3.swagger.io/api/v3/openapi.json
  INFLUX_URL: ${{ secrets.INFLUX_URL }}
  INFLUX_TOKEN: ${{ secrets.INFLUX_TOKEN }}
  INFLUX_ORG: ${{ secrets.INFLUX_ORG }}
  INFLUX_BUCKET: ${{ secrets.INFLUX_BUCKET }}
  UI_TESTING_ROOT: ${{ github.workspace }}/ui-testing

defaults:
  run:
    working-directory: api-testing

jobs:
  schema-tests:
    name: Schema Contract Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: api-testing/pyproject.toml

      - name: Install dependencies
        run: pip install schemathesis pytest allure-pytest

      - name: Run schema tests
        run: |
          pytest tests/schema/ \
            --hypothesis-max-examples=20 \
            --alluredir=reports/allure-results \
            -v --tb=short -q

      - name: Upload Allure results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-schema
          path: api-testing/reports/allure-results/

      - name: Upload schemathesis report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: schemathesis-report
          path: api-testing/schemathesis-report/

  crud-tests:
    name: Functional CRUD Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: api-testing/pyproject.toml

      - name: Install dependencies
        run: pip install pytest requests python-dotenv pytest-json-report allure-pytest

      - name: Run CRUD tests
        run: |
          pytest tests/crud/ \
            --json-report \
            --json-report-file=reports/pytest-results.json \
            --alluredir=reports/allure-results \
            -v --tb=short -q

      - name: Upload pytest results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pytest-results
          path: api-testing/reports/pytest-results.json

      - name: Upload Allure results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-crud
          path: api-testing/reports/allure-results/

  load-tests:
    name: Load Tests
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Setup k6
        uses: grafana/setup-k6-action@v1

      - name: Run load tests
        run: |
          k6 run tests/load/load.js \
            --env BASE_URL=$BASE_URL \
            --out json=reports/k6-summary.json

      - name: Upload k6 results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: k6-results
          path: api-testing/reports/k6-summary.json

  push-metrics:
    name: Push Metrics to InfluxDB
    runs-on: ubuntu-latest
    needs: [schema-tests, crud-tests]
    if: always()
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install influxdb-client python-dotenv certifi

      - name: Download schemathesis report
        uses: actions/download-artifact@v4
        with:
          name: schemathesis-report
          path: api-testing/schemathesis-report/
        continue-on-error: true

      - name: Download pytest results
        uses: actions/download-artifact@v4
        with:
          name: pytest-results
          path: api-testing/reports/
        continue-on-error: true

      - name: Push metrics to InfluxDB
        run: |
          SSL_CERT_FILE=$(python3 -c "import certifi; print(certifi.where())") \
          python scripts/push_metrics.py --source all

  allure-report:
    name: Allure Report
    runs-on: ubuntu-latest
    needs: [schema-tests, crud-tests]
    if: always()
    steps:
      - uses: actions/checkout@v4

      - name: Download all Allure results
        uses: actions/download-artifact@v4
        with:
          pattern: allure-*
          merge-multiple: true
          path: api-testing/reports/allure-results/

      - name: Generate Allure report
        uses: simple-elf/allure-report-action@v1
        with:
          allure_results: api-testing/reports/allure-results
          allure_report: api-testing/reports/allure-report

      - name: Upload Allure report
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: api-testing/reports/allure-report/
