name: API Testing

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  BASE_URL: ${{ secrets.BASE_URL }}
  API_KEY: ${{ secrets.API_KEY }}
  ENV: staging

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: Tests de contrato con Schemathesis
  # ---------------------------------------------------------------------------
  schema-tests:
    name: Schema Contract Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install schemathesis allure-pytest pytest

      - name: Run schema tests
        run: |
          st run $BASE_URL/openapi.json \
            --checks all \
            --max-examples 50 \
            --report allure

      - name: Upload Allure results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-schema
          path: reports/allure-results/

  # ---------------------------------------------------------------------------
  # Job 2: Tests funcionales CRUD con pytest
  # ---------------------------------------------------------------------------
  crud-tests:
    name: Functional CRUD Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run CRUD tests
        run: |
          pytest tests/crud/ -v \
            --alluredir=reports/allure-results

      - name: Upload Allure results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-crud
          path: reports/allure-results/

      - name: Upload test state
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-state
          path: data/output/test-state.json

  # ---------------------------------------------------------------------------
  # Job 3: Load testing con k6 (solo en push a main)
  # ---------------------------------------------------------------------------
  load-tests:
    name: Load Tests
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Setup k6
        uses: grafana/setup-k6-action@v1

      - name: Run load tests
        run: |
          k6 run tests/load/load.js \
            --env BASE_URL=$BASE_URL \
            --out json=reports/k6-summary.json

      - name: Upload k6 results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: k6-results
          path: reports/k6-summary.json

  # ---------------------------------------------------------------------------
  # Job 4: Generar reporte Allure consolidado
  # ---------------------------------------------------------------------------
  allure-report:
    name: Allure Report
    runs-on: ubuntu-latest
    needs: [schema-tests, crud-tests]
    if: always()
    steps:
      - uses: actions/checkout@v4

      - name: Download all Allure results
        uses: actions/download-artifact@v4
        with:
          pattern: allure-*
          merge-multiple: true
          path: reports/allure-results/

      - name: Generate Allure report
        uses: simple-elf/allure-report-action@v1
        with:
          allure_results: reports/allure-results
          allure_report: reports/allure-report

      - name: Upload Allure report
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: reports/allure-report/
