# Configuración de perfiles de Schemathesis
# Referencia: https://schemathesis.readthedocs.io/

[profile.fast]
# Smoke test — verificación rápida de que la API responde correctamente
checks = ["not_a_server_error"]
max_examples = 10

[profile.schema]
# Validación completa del contrato OpenAPI
checks = ["all"]
max_examples = 50

[profile.full]
# Exhaustivo — incluye tests stateful (encadenamiento de operaciones)
checks = ["all"]
max_examples = 200
stateful = "links"

[thresholds]
# Tiempo máximo de respuesta aceptable en milisegundos
response_time_ms = 2000

# Tasa de error máxima aceptable (porcentaje)
error_rate_percent = 1
