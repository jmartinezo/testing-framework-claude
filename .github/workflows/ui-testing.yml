name: UI Testing

on:
  push:
    branches: [main, develop]
    paths:
      - "ui-testing/**"
  pull_request:
    branches: [main]
    paths:
      - "ui-testing/**"
  workflow_dispatch:

env:
  BASE_URL: https://petstore3.swagger.io/api/v3
  HEADLESS: true
  INFLUX_URL: ${{ secrets.INFLUX_URL }}
  INFLUX_TOKEN: ${{ secrets.INFLUX_TOKEN }}
  INFLUX_ORG: ${{ secrets.INFLUX_ORG }}
  INFLUX_BUCKET: ${{ secrets.INFLUX_BUCKET }}

defaults:
  run:
    working-directory: ui-testing

jobs:
  smoke-tests:
    name: Smoke Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: ui-testing/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run smoke tests
        run: |
          npx playwright test tests/smoke/ \
            --project=chromium \
            --reporter=list,html

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-smoke-report
          path: reports/playwright-report/

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-test-results
          path: reports/test-results/

  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: ui-testing/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run E2E tests
        run: |
          npx playwright test tests/e2e/ \
            --reporter=list,html

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-e2e-report
          path: ui-testing/reports/playwright-report/

  push-metrics:
    name: Push Metrics to InfluxDB
    runs-on: ubuntu-latest
    needs: [smoke-tests]
    if: always()
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install influxdb-client python-dotenv certifi
        working-directory: api-testing

      - name: Download test results
        uses: actions/download-artifact@v4
        with:
          name: playwright-test-results
          path: ui-testing/reports/test-results/
        continue-on-error: true

      - name: Push Playwright metrics to InfluxDB
        run: |
          SSL_CERT_FILE=$(python3 -c "import certifi; print(certifi.where())") \
          UI_TESTING_ROOT=${{ github.workspace }}/ui-testing \
          python scripts/push_metrics.py --source playwright
        working-directory: api-testing
        env:
          INFLUX_URL: ${{ secrets.INFLUX_URL }}
          INFLUX_TOKEN: ${{ secrets.INFLUX_TOKEN }}
          INFLUX_ORG: ${{ secrets.INFLUX_ORG }}
          INFLUX_BUCKET: ${{ secrets.INFLUX_BUCKET }}
